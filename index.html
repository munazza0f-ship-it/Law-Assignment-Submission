<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Submission Portal</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #4f46e5; /* Modern Indigo */
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
            background-color: #fafafa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Modern Custom File Upload Dropzone */
        .file-dropzone {
            position: relative;
            border: 2px dashed var(--border-color);
            padding: 32px 20px;
            border-radius: 8px;
            text-align: center;
            background-color: #fafafa;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-dropzone:hover {
            border-color: var(--accent);
            background-color: rgba(79, 70, 229, 0.02);
        }

        .file-dropzone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .dropzone-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .dropzone-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        .file-name-preview {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.6; }

        #status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Submit Assignment</h1>
        <p>Your submission will be uploaded securely and privately.</p>
    </header>

    <form id="uploadForm">
        <div class="input-group">
            <label for="studentName">Full Name</label>
            <input type="text" id="studentName" required>
        </div>
        
        <div class="input-group">
            <label for="studentId">Roll Number</label>
            <input type="text" id="RollNumber" required>
        </div>
        
        <div class="input-group">
            <label>Assignment File</label>
            <div class="file-dropzone">
                <span class="dropzone-icon">📁</span>
                <p class="dropzone-text" id="dropzoneText">Click or drag file here to upload</p>
                <div class="file-name-preview" id="fileNamePreview"></div>
                <input type="file" id="file" required>
            </div>
        </div>

        <button type="submit" id="submitBtn">Submit Securely</button>
    </form>
    
    <div id="status"></div>
</div>

<script>

        if (fileInput.files.length > 0) {
            dropzoneText.innerText = "File selected:";
            fileNamePreview.innerText = fileInput.files[0].name;
            fileNamePreview.style.display = "block";
        } else {
            dropzoneText.innerText = "Click or drag file here to upload";
            fileNamePreview.style.display = "none";
        }
    });

    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');

        submitBtn.innerText = "Uploading securely...";

        reader.readAsDataURL(selectedFile);
